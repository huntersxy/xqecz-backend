basePath: /api
definitions:
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.RegisterRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.AuditStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - AuditStatusPending
    - AuditStatusApproved
    - AuditStatusRejected
  models.Claim:
    properties:
      approved_by:
        type: integer
      content:
        $ref: '#/definitions/models.Content'
      content_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      reason:
        type: string
      remark:
        type: string
      status:
        $ref: '#/definitions/models.ClaimStatus'
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.ClaimStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - ClaimStatusPending
    - ClaimStatusApproved
    - ClaimStatusRejected
  models.Comment:
    properties:
      content:
        $ref: '#/definitions/models.Content'
      content_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_banned:
        type: boolean
      parent:
        $ref: '#/definitions/models.Comment'
      parent_id:
        type: integer
      replies:
        items:
          $ref: '#/definitions/models.Comment'
        type: array
      text:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.CommentReport:
    properties:
      comment:
        $ref: '#/definitions/models.Comment'
      comment_id:
        type: integer
      created_at:
        type: string
      handled:
        type: boolean
      id:
        type: integer
      reason:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Content:
    properties:
      audit_status:
        $ref: '#/definitions/models.AuditStatus'
      big_tag_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      file_path:
        type: string
      file_size:
        type: integer
      id:
        type: integer
      platform:
        type: string
      small_tag_id:
        type: integer
      tags:
        items:
          type: string
        type: array
      thumb_path:
        type: string
      title:
        type: string
      type:
        $ref: '#/definitions/models.ContentType'
      updated_at:
        type: string
      url:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      view_count:
        type: integer
    type: object
  models.ContentType:
    enum:
    - video
    - image
    - text
    - link
    type: string
    x-enum-varnames:
    - ContentTypeVideo
    - ContentTypeImage
    - ContentTypeText
    - ContentTypeLink
  models.Poll:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      options:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      vote_count:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      is_banned:
        type: boolean
      updated_at:
        type: string
      username:
        type: string
    type: object
  utils.SwaggerResponse:
    properties:
      code:
        example: 200
        type: integer
      data: {}
      message:
        example: 操作成功
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 小泉动漫后端API接口 - 支持内容管理、评论、投票、用户认证、站外资源等
  title: 小泉动漫 API
  version: "1.0"
paths:
  /admin/audit/{id}:
    post:
      consumes:
      - application/json
      description: 管理员审核内容（通过/拒绝）
      parameters:
      - description: 内容ID
        in: path
        name: id
        required: true
        type: integer
      - description: 审核信息
        in: body
        name: body
        required: true
        schema:
          properties:
            admin_id:
              type: integer
            remark:
              type: string
            status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Content'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 审核内容
      tags:
      - 管理
  /admin/claims:
    get:
      description: 管理员查看内容认领申请列表
      parameters:
      - description: 状态筛选
        enum:
        - pending
        - approved
        - rejected
        in: query
        name: status
        type: string
      - description: 内容ID筛选
        in: query
        name: content_id
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    list:
                      items:
                        $ref: '#/definitions/models.Claim'
                      type: array
                    total:
                      type: integer
                  type: object
              type: object
      security:
      - SessionAuth: []
      summary: 认领申请列表
      tags:
      - 管理
  /admin/claims/{id}/handle:
    post:
      consumes:
      - application/json
      description: 管理员通过或拒绝内容认领申请
      parameters:
      - description: 认领申请ID
        in: path
        name: id
        required: true
        type: integer
      - description: 操作(approve/reject)和备注
        in: body
        name: body
        required: true
        schema:
          properties:
            action:
              type: string
            remark:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Claim'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 处理认领申请
      tags:
      - 管理
  /admin/comments/reports:
    get:
      description: 管理员查看评论举报列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 举报列表
      tags:
      - 管理
  /admin/comments/reports/{id}/handle:
    post:
      description: 管理员处理评论举报，标记为已处理
      parameters:
      - description: 举报ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.CommentReport'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 处理举报
      tags:
      - 管理
  /admin/content/{id}/author:
    put:
      consumes:
      - application/json
      description: 管理员将内容转移给其他用户
      parameters:
      - description: 内容ID
        in: path
        name: id
        required: true
        type: integer
      - description: 目标用户ID
        in: body
        name: body
        required: true
        schema:
          properties:
            user_id:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 更新内容作者
      tags:
      - 管理
  /admin/content/all:
    get:
      description: 管理员查看所有内容列表（支持筛选）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 标签筛选
        in: query
        name: tag
        type: string
      - description: 内容类型
        enum:
        - video
        - image
        - text
        - link
        in: query
        name: type
        type: string
      - description: 审核状态
        enum:
        - approved
        - pending
        - rejected
        in: query
        name: audit_status
        type: string
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    list:
                      items:
                        $ref: '#/definitions/models.Content'
                      type: array
                    page:
                      type: integer
                    page_size:
                      type: integer
                    total:
                      type: integer
                    total_page:
                      type: integer
                  type: object
              type: object
      security:
      - SessionAuth: []
      summary: 所有内容
      tags:
      - 管理
  /admin/files/clean:
    delete:
      description: 管理员清理未被任何内容引用的上传文件和缩略图
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    deleted_count:
                      type: integer
                    deleted_files:
                      items:
                        type: string
                      type: array
                  type: object
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 清理孤立文件
      tags:
      - 管理
  /admin/pending:
    get:
      description: 管理员查看待审核内容列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    list:
                      items:
                        $ref: '#/definitions/models.Content'
                      type: array
                    page:
                      type: integer
                    page_size:
                      type: integer
                    total:
                      type: integer
                    total_page:
                      type: integer
                  type: object
              type: object
      security:
      - SessionAuth: []
      summary: 待审核内容
      tags:
      - 管理
  /admin/users:
    get:
      description: 管理员查看所有用户
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 用户名搜索
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    list:
                      items:
                        $ref: '#/definitions/models.User'
                      type: array
                    total:
                      type: integer
                  type: object
              type: object
      security:
      - SessionAuth: []
      summary: 用户列表
      tags:
      - 管理
  /admin/users/{id}:
    delete:
      description: 删除用户及其所有内容
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 删除用户
      tags:
      - 管理
  /admin/users/{id}/ban:
    put:
      consumes:
      - application/json
      description: 封禁或解封指定用户（不能封禁管理员）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 封禁信息
        in: body
        name: body
        required: true
        schema:
          properties:
            is_banned:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 封禁/解封用户
      tags:
      - 管理
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: 设置/取消管理员
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: body
        required: true
        schema:
          properties:
            is_admin:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 更新用户角色
      tags:
      - 管理
  /auth/init-admin:
    post:
      description: 首次运行时创建管理员账号，密码在服务器日志中查看（仅当无管理员时可用）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    admin_id:
                      type: integer
                    username:
                      type: string
                  type: object
              type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      summary: 初始化管理员
      tags:
      - 认证
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，成功返回session cookie
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    user:
                      properties:
                        id:
                          type: integer
                        is_admin:
                          type: boolean
                        username:
                          type: string
                      type: object
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      description: 清除session，退出登录
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      summary: 用户登出
      tags:
      - 认证
  /auth/me:
    get:
      description: 获取当前登录用户的信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    id:
                      type: integer
                    is_admin:
                      type: boolean
                    username:
                      type: string
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 当前用户信息
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: 注册新用户账号
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    user_id:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      summary: 用户注册
      tags:
      - 认证
  /bot/upload:
    post:
      consumes:
      - multipart/form-data
      description: Bot通过Token认证上传内容（自动审核通过）
      parameters:
      - description: Bot Token
        in: header
        name: X-Bot-Token
        type: string
      - description: 标题
        in: header
        name: X-Bot-Title
        type: string
      - description: 链接URL
        in: header
        name: X-Bot-Url
        type: string
      - description: 标签（逗号分隔）
        in: header
        name: X-Bot-Tags
        type: string
      - description: 文件
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  properties:
                    id:
                      type: integer
                    type:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      summary: Bot上传
      tags:
      - Bot
  /comment/{id}:
    delete:
      description: 作者或管理员可删除评论
      parameters:
      - description: 评论ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 删除评论
      tags:
      - 评论
  /comment/add:
    post:
      consumes:
      - multipart/form-data
      description: 对已审核通过的内容添加评论，支持回复其他评论
      parameters:
      - description: 内容ID
        in: formData
        name: content_id
        required: true
        type: integer
      - description: 评论内容
        in: formData
        name: text
        required: true
        type: string
      - description: 父评论ID（回复时使用）
        in: formData
        name: parent_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Comment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.SwaggerResponse'
      security:
      - SessionAuth: []
      summary: 添加评论
      tags:
      - 评论
  /comment/count/{content_id}:
    get:
      description: 获取指定内容的评论总数
      parameters:
      - description: 内容ID
        in: path
        name: content_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SwaggerResponse'
            - properties:
