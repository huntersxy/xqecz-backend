mysql:
    host: localhost
    port: 3306
    user: root
    password: root
    database: xiaoquan
    charset: utf8mb4
    max_open_conns: 30
    max_idle_conns: 10
    conn_max_lifetime: 3600
    conn_max_idle_time: 1800
server:
    port: 8080
    upload_dir: ./uploads
    thumbnail_dir: ./thumbnails
    max_upload_size: 1073741824
    allowed_origins:
        - http://localhost:3000
        - https://your-domain.com
spam_api:
    url: http://localhost:8081/api/spam/check
redis:
    host: localhost
    port: 6379
    password: ""
    db: 0
    timeout: 5
    prefix: 'xiaoquan:'
bot:
    token: your-bot-token-here
recommend:
    excluded_tags:
        - bot
migrate_thumbnails: false
init_admin: false
tinify_enabled: false
tinify_api_key: ""
